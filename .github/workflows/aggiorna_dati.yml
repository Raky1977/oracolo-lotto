name: Converti Storico Lotto in JSON

on:
  push:
    branches:
      - main  # Parte sempre quando fai un commit su main, senza filtri restrittivi sui file

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Controlla il codice del repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true  # Forza il mantenimento delle credenziali per il push finale

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Esegui il convertitore
      run: python convertitore.py

    - name: Commit e Push dei cambiamenti
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add estrazioni_complete.json log_diagnostica.txt
        git commit -m "Aggiornamento automatico database JSON" || exit 0
        git push
