name: Update Lotto Data

on:
  schedule:
    - cron: '30 21 * * 2,4,6' # Gira martedì, giovedì e sabato alle 22:30 italiane
  workflow_dispatch: # Ti permette di provarlo subito cliccando il tasto

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 # AGGIUNTO beautifulsoup4

      - name: Run script
        run: python scripts/update_data.py

      - name: Commit JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add estrazioni.json
          git commit -m "Update estrazioni $(date)" || echo "No changes"
          git push
