name: Update Lotto Data
on:
  schedule:
    - cron: '0 21 * * *'  # Ogni sera alle 22:00 italiane (UTC+1)
  workflow_dispatch:      # Per lanciarlo a mano

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # AGGIUNTO: Forza i permessi di scrittura direttamente qui
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Versione aggiornata

      - name: Set up Python
        uses: actions/setup-python@v5 # Versione aggiornata
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run update script
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add estrazioni.json
          git commit -m "Update estrazioni $(date)" || echo "Nessuna modifica da salvare"
          git push
